<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RootAkses Contact</title>
    <!-- Tambahan CSS untuk mempercantik tampilan -->
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('image.jpg');
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #fff;
            margin-bottom: 15px;
            object-fit: cover;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        p {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 25px;
        }
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .social-links a {
            background: #fff;
            color: #333;
            text-decoration: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            transition: all 0.3s ease;
            display: block;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .social-links a:hover {
            background: #764ba2;
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Ganti URL foto di bawah dengan link foto Anda -->
    <img src="https://raw.githubusercontent.com/ZeroNIghtALT/zeronightalt.github.io/main/files/ZeroNIghtzee_.png" alt="Foto Profil" class="profile-img">
    <h1>ZeroNIghtzee_</h1>
    <p>Love Making "Stuff" :)</p>

    <div class="social-links">
        <!-- Ganti tanda # dengan link sosial media Anda -->
        <a href="https://https://cloud.rootakses.my.id/" target="_blank">Website</a>
        <a href="https://tiktok.com" target="_blank">Youtube</a>
        <a href="https://wa.me/628561411054" target="_blank">WhatsApp</a>
        <a href="https://chat.whatsapp.com/LK4yWFe4FBHEJGqzWsMZX1" target="_blank">Whatsapp Group Chat</a>
    </div>
</div>

</body>
</html>
