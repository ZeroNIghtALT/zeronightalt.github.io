<head>

<style>

  header {
  padding-left:15px;

 font-family:Roboto;

        hr {

header button{
      padding: 6px 15px;
            color: #000;
            cursor: pointer;

            font-size: 89%;

}
  
body{
font-family:Arial;

}

.box{
background:white;
max-width:700px;
margin:40px auto;

}


.file{
padding:15px;

<body>
<header>
  <h1>RootCloud</h1> <a href='contact.html'>
  <button>Contact</button></a>
</header>

<div class="box">

<h2>File List</h2>
<hr>
<div id="list">
Loading...
</div>


</div>
<footer>
    <p>
    Created by ZeroNIghtzee_ | <a href='https://rootakses.my.id'>rootakses.my.id</a>
  </p>
  </footer>
<script>


fetch("files.json?v=" + Date.now())

.then(r=>r.json())

.then(files=>{


let html="";


files.forEach(file=>{


html += `

<div class="file">

📦 ${file.nama}

<br><br>

<a href="${file.url}" download>

Download

</a>


</div>


`;


});


document.getElementById("list").innerHTML=html;


});


</script>
