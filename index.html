<!DOCTYPE html>
<html>

<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<title>RootAkses Cloud</title>

<style>

  header {
  padding-left:15px;
  background:#0096FF;
  display:flex;
  gap:67%;
  color:#ffffff;
 font-family:Roboto;
  }

  
header button{
height: 30px;
width: 100px;
margin: auto;
padding-right:45px;
}
  
body{
font-family:Arial;
background:#333333;
}

.box{
background:white;
max-width:700px;
margin:40px auto;
padding:20px;
border-radius:15px;
}


.file{
padding:15px;
border-bottom:1px solid #ddd;
}


a{

background:#18a999;
color:white;
padding:8px 15px;
text-decoration:none;
border-radius:8px;

}

</style>

</head>


<body>
<header>
  <h1>RootCloud</h1>
  <button>Github</button>
</header>

<div class="box">

<h2>📂 File</h2>

<div id="list">
Loading...
</div>


</div>


<script>


fetch("files.json")

.then(r=>r.json())

.then(files=>{


let html="";


files.forEach(file=>{


html += `

<div class="file">

📦 ${file.nama}

<br><br>

<a href="${file.url}" download>

Download

</a>


</div>


`;


});


document.getElementById("list").innerHTML=html;


});


</script>


</body>

</html>
