<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Server Reminder Lemehost</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}


.card{
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    width:400px;
    text-align:center;
}


h1{
    color:#38bdf8;
}


#expired{
    color:#facc15;
}


#expiredTimer{
    color:#22c55e;
    font-size:24px;
    margin:15px;
}


#onlineTimer{
    color:#38bdf8;
    font-size:22px;
    margin:15px;
}


button{
    background:#22c55e;
    color:white;
    border:0;
    padding:12px 25px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}


button:hover{
    background:#16a34a;
}

</style>

</head>


<body>


<div class="card">


<h1>🚀 Lemehost Server</h1>


<p>Expired Server:</p>

<h3 id="expired"></h3>

<div id="expiredTimer"></div>


<hr>


<p>Online Timer:</p>

<div id="onlineTimer"></div>



<button onclick="renew()">
🔄 Renew Server
</button>



</div>





<script>


let expired =
localStorage.getItem("expired");


let online =
localStorage.getItem("online");





// awal expired 4 hari

if(!expired){

    expired =
    Date.now() +
    (4 * 24 * 60 * 60 * 1000);


    localStorage.setItem(
        "expired",
        expired
    );

}





// awal online 30 menit

if(!online){

    online =
    Date.now() +
    (30 * 60 * 1000);


    localStorage.setItem(
        "online",
        online
    );

}





// tombol renew

function renew(){


    let now = Date.now();



    // reset expired 4 hari

    expired =
    now +
    (4 * 24 * 60 * 60 * 1000);



    localStorage.setItem(
        "expired",
        expired
    );




    // reset online 30 menit

    online =
    now +
    (30 * 60 * 1000);



    localStorage.setItem(
        "online",
        online
    );




    alert(
        "✅ Renew berhasil! Membuka Lemehost..."
    );



    // buka web Lemehost

    window.open(
        "https://panel.lemehost.com",
        "_blank"
    );


}







function update(){



    expired =
    Number(
        localStorage.getItem("expired")
    );


    online =
    Number(
        localStorage.getItem("online")
    );





    // ===== EXPIRED TIMER =====


    let e =
    expired - Date.now();



    if(e <= 0){


        document.getElementById("expiredTimer")
        .innerHTML =
        "❌ Server Expired";


    }else{


        let d =
        Math.floor(
        e/(1000*60*60*24)
        );


        let h =
        Math.floor(
        (e/(1000*60*60))%24
        );


        let m =
        Math.floor(
        (e/(1000*60))%60
        );


        let s =
        Math.floor(
        (e/1000)%60
        );



        document.getElementById("expiredTimer")
        .innerHTML =
        `${d} Hari ${h} Jam ${m} Menit ${s} Detik`;

    }



    document.getElementById("expired")
    .innerHTML =
    new Date(expired)
    .toLocaleString("id-ID");







    // ===== ONLINE TIMER =====


    let o =
    online - Date.now();



    if(o <= 0){


        document.getElementById("onlineTimer")
        .innerHTML =
        "🔴 Server Offline";


    }else{


        let m =
        Math.floor(
        o/(1000*60)
        );


        let s =
        Math.floor(
        (o/1000)%60
        );



        document.getElementById("onlineTimer")
        .innerHTML =
        `${m} Menit ${s} Detik`;

    }



}




setInterval(update,1000);

update();



</script>


</body>
</html>
