<!DOCTYPE html>
<html>

<head>

<title>RootAkses Cloud</title>

<style>

  header {
  background:#0096FF;
  display:flex;
  gap:500px;
  }
body{
font-family:Arial;
background:#333333;
}

.box{
background:white;
max-width:700px;
margin:40px auto;
padding:20px;
border-radius:15px;
}


.file{
padding:15px;
border-bottom:1px solid #ddd;
}


a{

background:#18a999;
color:white;
padding:8px 15px;
text-decoration:none;
border-radius:8px;

}

</style>

</head>


<body>
<header>
  <p>RootCloud - By maker</p>
  <button>Github</button>
</header>

<div class="box">

<h2>📂 File</h2>

<div id="list">
Loading...
</div>


</div>


<script>


fetch("files.json")

.then(r=>r.json())

.then(files=>{


let html="";


files.forEach(file=>{


html += `

<div class="file">

📦 ${file.nama}

<br><br>

<a href="${file.url}" download>

Download

</a>


</div>


`;


});


document.getElementById("list").innerHTML=html;


});


</script>


</body>

</html>
