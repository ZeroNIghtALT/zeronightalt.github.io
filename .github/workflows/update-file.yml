name: Generate File List

on:
  push:
    paths:
      - "files/**"

jobs:

  generate:

    runs-on: ubuntu-latest

    steps:

    - name: Ambil repo
      uses: actions/checkout@v4


    - name: Buat files.json
      run: |

        echo "[" > files.json

        first=true

        for file in files/*; do

          if [ "$first" = true ]; then
            first=false
          else
            echo "," >> files.json
          fi


          name=$(basename "$file")


          echo "{\"nama\":\"$name\",\"url\":\"https://raw.githubusercontent.com/${{ github.repository }}/main/$file\"}" >> files.json


        done


        echo "]" >> files.json



    - name: Commit files.json

      run: |

        git config --global user.name "github-actions"

        git config --global user.email "actions@github.com"


        git add files.json
