name: Generate File List

on:
push:
paths:
- "files/**"

jobs:
generate:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Create files.json
    run: |
      shopt -s nullglob

      echo "[" > files.json

      first=true

      for file in files/*; do
        [ -f "$file" ] || continue

        if [ "$first" = true ]; then
          first=false
        else
          echo "," >> files.json
        fi

        name=$(basename "$file")

        printf '{"nama":"%s","url":"https://raw.githubusercontent.com/%s/main/%s"}' \
          "$name" "${{ github.repository }}" "$file" >> files.json
      done

      echo "]" >> files.json

      echo "Generated files.json:"
      cat files.json

  - name: Commit files.json
    run: |
      git config --global user.name "github-actions"
      git config --global user.email "actions@github.com"

      git add files.json

      git diff --staged --quiet || git commit -m "update file list"

      git push
```
